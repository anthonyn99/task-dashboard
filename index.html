// Fisher-Yates shuffle — returns a new shuffled array
function shuffleArray(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}

}

function DatePicker({value,onChange,label,T}){
  const now=new Date(),curY=now.getFullYear(),curM=now.getMonth(),curD=now.getDate();

function GitaLesson({T}){
  // Queue: shuffled array of indices into GITA_LESSONS; we pop from it.
  // When the queue is exhausted, a new shuffle is generated.
  const queueRef=useRef([]);
  const[idx,setIdx]=useState(()=>{
    // Pick a random starting index on mount
    return Math.floor(Math.random()*GITA_LESSONS.length);
  });

  // Build a fresh shuffled queue that excludes the current index
  // so the next card is always different from the current one
  function buildQueue(currentIdx){
    const all=Array.from({length:GITA_LESSONS.length},(_,i)=>i);
    const others=all.filter(i=>i!==currentIdx);
    return shuffleArray(others);
  }

  function nextLesson(){
    if(queueRef.current.length===0){
      queueRef.current=buildQueue(idx);
    }
    const next=queueRef.current.pop();
    setIdx(next);
  }

  const lesson=GITA_LESSONS[idx];

  return React.createElement("div",{style:{
      textAlign:"center",
      padding:"14px clamp(16px,4vw,60px)",
      position:"relative"
    }},
    React.createElement("p",{style:{
      fontFamily:"'Lora',serif",
      fontSize:"clamp(15px,1.5vw,17px)",
      fontWeight:400,
      fontStyle:"italic",
      color:T.TXD,
      lineHeight:1.7,
      maxWidth:820,
      margin:"0 auto"
    }},lesson.text),
    React.createElement("div",{style:{
      display:"flex",
      alignItems:"center",
      justifyContent:"flex-end",
      maxWidth:820,
      margin:"10px auto 0"
    }},
      React.createElement("span",{style:{
        fontFamily:"'Lora',serif",
        fontSize:12,
        color:T.TXM,
        fontStyle:"italic",
        letterSpacing:0.3
      }},"-Gita, "+lesson.chapter),
      React.createElement("button",{
        type:"button",
        title:"Next lesson",
        onClick:nextLesson,
        style:{
          background:"transparent",
          border:"none",
          cursor:"pointer",
          padding:"2px 0 2px 10px",
          color:T.TXM,
          fontSize:13,
          lineHeight:1,

        onMouseEnter:e=>e.currentTarget.style.opacity="0.85",

}

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC2aKunOKj5WS8NpgZhpyMzOYecBr5t2_4",
    authDomain: "task-dashboard-d2b53.firebaseapp.com",
    projectId: "task-dashboard-d2b53",
    storageBucket: "task-dashboard-d2b53.firebasestorage.app",
    messagingSenderId: "982539604706",
    appId: "1:982539604706:web:e93da1aef499fcee2044bb"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const DOC_PATH = "dashboards/main";
  const EL_DOC_PATH = "dashboards/expenses";

  let _saveTimer = null;
  let _elSaveTimer = null;
  let _unsubscribe = null;
  let _elUnsubscribe = null;
  let _lastOwnSaveAt = 0;
  let _elLastOwnSaveAt = 0;

  // Expose to React app via window
  window._fbReady = false;
  window._fbSave = null;
  window._fbOnLoad = null;

  async function init() {
    const docRef = doc(db, DOC_PATH);
    const elDocRef = doc(db, EL_DOC_PATH);

    // ── TaskHub load ──────────────────────────────────────────────────────────
    window._fbLoad = async () => {
      try {
        const snap = await getDoc(docRef);
        if (snap.exists()) return snap.data();
        return null;
      } catch(e) {
        console.warn("Firebase load failed:", e);
        return null;
      }
    };

    // ── TaskHub save ──────────────────────────────────────────────────────────
    window._fbSave = (payload) => {
      _lastOwnSaveAt = Date.now();
      if (_saveTimer) clearTimeout(_saveTimer);
      _saveTimer = setTimeout(async () => {
        try {
          _lastOwnSaveAt = Date.now();
          await setDoc(docRef, payload);
          _lastOwnSaveAt = Date.now();
          window.dispatchEvent(new CustomEvent("fb-saved"));
        } catch(e) {
          console.warn("Firebase save failed:", e);
          window.dispatchEvent(new CustomEvent("fb-error"));
        }
      }, 1500);
    };

    // ── TaskHub real-time listener ────────────────────────────────────────────
    _unsubscribe = onSnapshot(docRef, (snap) => {
      if (Date.now() - _lastOwnSaveAt < 8000) return;
      if (snap.exists()) {
        window.dispatchEvent(new CustomEvent("fb-remote-update", { detail: snap.data() }));
      }
    });

    // ── ExpenseLog load ───────────────────────────────────────────────────────
    window._fbLoadExpenses = async () => {
      try {
        const snap = await getDoc(elDocRef);
        if (snap.exists() && Array.isArray(snap.data().expenses)) return snap.data().expenses;
        return null;
      } catch(e) {
        console.warn("Firebase expenses load failed:", e);
        return null;
      }
    };

    // ── ExpenseLog save (debounced, strips null for Firestore compatibility) ──
    window._fbSaveExpenses = (expenseList) => {
      _elLastOwnSaveAt = Date.now();
      if (_elSaveTimer) clearTimeout(_elSaveTimer);
      _elSaveTimer = setTimeout(async () => {
        try {
          // Sanitize: remove null fields Firestore can't store in nested objects
          const sanitized = expenseList.map(e => {
            const out = {};
            Object.entries(e).forEach(([k,v]) => { if(v !== null && v !== undefined) out[k] = v; });
            return out;
          });
          _elLastOwnSaveAt = Date.now();
          await setDoc(elDocRef, { expenses: sanitized, savedAt: Date.now() });
          _elLastOwnSaveAt = Date.now();
          window.dispatchEvent(new CustomEvent("fb-el-saved"));
        } catch(e) {
          console.warn("Firebase expenses save failed:", e);
          window.dispatchEvent(new CustomEvent("fb-el-error"));
        }
      }, 1500);
    };

    // ── ExpenseLog real-time listener ─────────────────────────────────────────
    _elUnsubscribe = onSnapshot(elDocRef, (snap) => {
      if (Date.now() - _elLastOwnSaveAt < 8000) return;
      if (snap.exists() && Array.isArray(snap.data().expenses)) {
        window.dispatchEvent(new CustomEvent("fb-el-remote-update", { detail: snap.data().expenses }));
      }
    });

    window._fbReady = true;
    window.dispatchEvent(new CustomEvent("fb-ready"));
  }

  init();
</script>

<script>
(function(){
  const TH_THEME_KEY = 'td6_theme';
  const EL_DATA_KEY  = 'el_expenses';
  const EL_SEED_KEY  = 'el_seeded';

  function elUid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

  const SEED=[
    {id:elUid(),name:"Rent / Mortgage",monthly:null,annual:null},
    {id:elUid(),name:"Electricity",monthly:80,annual:null},
    {id:elUid(),name:"Internet",monthly:60,annual:null},
    {id:elUid(),name:"Spotify",monthly:null,annual:99},
    {id:elUid(),name:"Gym Membership",monthly:40,annual:null},
    {id:elUid(),name:"Car Insurance",monthly:null,annual:1200},
  ];

  function loadExpLocal(){try{const v=localStorage.getItem(EL_DATA_KEY);return v?JSON.parse(v):null;}catch{return null;}}
  function saveExpLocal(l){try{localStorage.setItem(EL_DATA_KEY,JSON.stringify(l));}catch{}}
  function elLoadTheme(){try{const v=localStorage.getItem(TH_THEME_KEY);return v!==null?JSON.parse(v):true;}catch{return true;}}
  function elSaveTheme(d){try{localStorage.setItem(TH_THEME_KEY,JSON.stringify(d));}catch{}}

  // Seed localStorage on first run
  if(!localStorage.getItem(EL_SEED_KEY)){
    saveExpLocal(SEED.map(e=>({...e,id:elUid()})));
    localStorage.setItem(EL_SEED_KEY,'1');
  }

  let expenses = loadExpLocal() || SEED.map(e=>({...e,id:elUid()}));
  let elEditMode = false;
  let elModalState = null;
  let elSyncTimer = null;

  // ── Theme ────────────────────────────────────────────────────────────────────
  const EL_DARK  = {bg:'#16161a',s1:'#1e1e24',s2:'#26262e',bd:'#32323c',bdl:'#42424f',tx:'#ececf0',txd:'#9898a8',txm:'#58586a',ac:'#7eb8a0',err:'#d47a6a',shadow:'rgba(0,0,0,0.5)',acg:'rgba(126,184,160,0.12)',grn:'#7ec890'};
  const EL_LIGHT = {bg:'#f5f0e8',s1:'#fffdf8',s2:'#f0ead8',bd:'#ddd5c4',bdl:'#c8bea8',tx:'#2d2618',txd:'#6b5e48',txm:'#a8987a',ac:'#4a7c59',err:'#c05a3a',shadow:'rgba(0,0,0,0.12)',acg:'rgba(74,124,89,0.1)',grn:'#4a7c59'};

  function elApplyTheme(){
    const isDark=elLoadTheme();
    const t=isDark?EL_DARK:EL_LIGHT;
    const root=document.getElementById('el-root');
    if(!root)return;
    Object.entries({'--el-bg':t.bg,'--el-s1':t.s1,'--el-s2':t.s2,'--el-bd':t.bd,'--el-bdl':t.bdl,'--el-tx':t.tx,'--el-txd':t.txd,'--el-txm':t.txm,'--el-ac':t.ac,'--el-err':t.err,'--el-shadow':t.shadow,'--el-acg':t.acg,'--el-grn':t.grn}).forEach(([k,v])=>root.style.setProperty(k,v));
    root.style.background=t.bg;
    document.body.style.background=t.bg;
    document.documentElement.style.background=t.bg;
    const btn=document.getElementById('el-theme-btn');
    if(btn)btn.textContent=isDark?'☀️':'🌙';
  }

  // ── Sync status badge ────────────────────────────────────────────────────────
  function elSetSync(status){
    const el=document.getElementById('el-sync-status');
    if(!el)return;
    const isDark=elLoadTheme();
    const t=isDark?EL_DARK:EL_LIGHT;
    if(status==='saving'){el.style.display='';el.style.color=t.txm;el.textContent='Syncing…';}
    else if(status==='saved'){el.style.display='';el.style.color=t.grn;el.textContent='✓ Synced';if(elSyncTimer)clearTimeout(elSyncTimer);elSyncTimer=setTimeout(()=>{el.style.display='none';},2500);}
    else if(status==='error'){el.style.display='';el.style.color=t.err;el.textContent='⚠ Sync failed';}
    else{el.style.display='none';}
  }

  // ── Save: localStorage + Firebase ───────────────────────────────────────────
  function elSaveAll(list){
    saveExpLocal(list);
    if(window._fbSaveExpenses){
      elSetSync('saving');
      window._fbSaveExpenses(list);
    }
  }

  // ── Firebase events ──────────────────────────────────────────────────────────
  function elInitFirebase(){
    // Load from Firebase on ready
    const doLoad=async()=>{
      if(!window._fbLoadExpenses)return;
      const remote=await window._fbLoadExpenses();
      if(remote&&Array.isArray(remote)&&remote.length>0){
        // Restore null for optional fields that were stripped before saving
        const restored=remote.map(e=>({monthly:null,annual:null,...e}));
        expenses=restored;
        saveExpLocal(expenses);
        localStorage.setItem(EL_SEED_KEY,'1');
        elRender();
      }
    };
    if(window._fbReady)doLoad();
    else window.addEventListener('fb-ready',doLoad,{once:true});

    // Saved confirmation
    window.addEventListener('fb-el-saved',()=>elSetSync('saved'));
    window.addEventListener('fb-el-error',()=>elSetSync('error'));

    // Remote update from another device
    window.addEventListener('fb-el-remote-update',(ev)=>{
      if(!ev.detail||!Array.isArray(ev.detail))return;
      const restored=ev.detail.map(e=>({monthly:null,annual:null,...e}));
      expenses=restored;
      saveExpLocal(expenses);
      elRender();
      elSetSync('saved');
    });
  }

  function elFmt(v){return '$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

  function elCalcTotals(list){
    let mo=0,an=0;
    list.forEach(e=>{const m=e.monthly!=null?e.monthly:0,a=e.annual!=null?e.annual:0;mo+=m+a/12;an+=a+m*12;});
    return{mo,an};
  }

  function elEsc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  function elRender(){
    elApplyTheme();
    const{mo,an}=elCalcTotals(expenses);

    const sum=document.getElementById('el-summary');
    if(sum)sum.innerHTML=`
      <div class="el-summary-card">
        <span class="el-summary-label">Monthly Total</span>
        <span class="el-summary-amount">$${mo.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
      </div>
      <div class="el-summary-card">
        <span class="el-summary-label">Annual Total</span>
        <span class="el-summary-amount">$${an.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
      </div>`;

    const list=document.getElementById('el-list');
    if(list){
      if(expenses.length===0){
        list.innerHTML='<div class="el-empty">No expenses yet. Toggle edit mode to add one.</div>';
      } else {
        list.innerHTML=expenses.map(e=>`
          <div class="el-expense-row">
            <div class="el-expense-name">${elEsc(e.name)}</div>
            <div class="el-expense-costs">
              ${e.monthly!=null?`<span class="el-cost-pill">${elFmt(e.monthly)}<span style="color:var(--el-txm);font-weight:500">/mo</span></span>`:''}
              ${e.annual!=null?`<span class="el-cost-pill">${elFmt(e.annual)}<span style="color:var(--el-txm);font-weight:500">/yr</span></span>`:''}
              ${e.monthly==null&&e.annual==null?`<span style="font-size:11px;color:var(--el-txm);font-style:italic">—</span>`:''}
            </div>
            ${elEditMode?`<div class="el-actions">
              <button class="el-icon-btn edit" data-edit="${elEsc(e.id)}" title="Edit">✎</button>
              <button class="el-icon-btn del" data-del="${elEsc(e.id)}" title="Delete">×</button>
            </div>`:''}
          </div>`).join('');
        list.querySelectorAll('[data-edit]').forEach(b=>{
          b.addEventListener('click',()=>{const exp=expenses.find(x=>x.id===b.dataset.edit);if(exp){elModalState={mode:'edit',expense:{...exp}};elOpenModal();}});
        });
        list.querySelectorAll('[data-del]').forEach(b=>{
          b.addEventListener('click',()=>{expenses=expenses.filter(x=>x.id!==b.dataset.del);elSaveAll(expenses);elRender();});
        });
      }
    }

    const track=document.getElementById('el-track'),thumb=document.getElementById('el-thumb'),lbl=document.getElementById('el-edit-label');
    if(track){track.classList.toggle('on',elEditMode);thumb.classList.toggle('on',elEditMode);}
    if(lbl)lbl.textContent=elEditMode?'✎':'👁';
    const tog=document.getElementById('el-edit-toggle');
    if(tog)tog.classList.toggle('active',elEditMode);
    const addBtn=document.getElementById('el-add-btn');
    if(addBtn)addBtn.style.display=elEditMode?'':'none';
  }

  function elOpenModal(){
    const ov=document.getElementById('el-overlay');
    const title=document.getElementById('el-modal-title');
    const fname=document.getElementById('el-fname');
    const fmo=document.getElementById('el-fmonthly');
    const fan=document.getElementById('el-fannual');
    if(!ov||!fname)return;
    const isEdit=elModalState?.mode==='edit';
    const e=isEdit?elModalState.expense:null;
    if(title)title.textContent=(isEdit?'Edit':'New')+' Expense';
    fname.value=isEdit?e.name:'';
    fmo.value=isEdit&&e.monthly!=null?e.monthly:'';
    fan.value=isEdit&&e.annual!=null?e.annual:'';
    ov.style.display='flex';
    setTimeout(()=>fname.focus(),40);
  }

  function elCloseModal(){
    const ov=document.getElementById('el-overlay');
    if(ov)ov.style.display='none';
    elModalState=null;
  }

  function elHandleSave(){
    const name=(document.getElementById('el-fname')?.value||'').trim();
    const moV=document.getElementById('el-fmonthly')?.value.trim();
    const anV=document.getElementById('el-fannual')?.value.trim();
    if(!name)return;
    const mo=moV&&!isNaN(parseFloat(moV))?parseFloat(moV):null;
    const an=anV&&!isNaN(parseFloat(anV))?parseFloat(anV):null;
    if(elModalState?.mode==='edit'){
      expenses=expenses.map(e=>e.id===elModalState.expense.id?{...e,name,monthly:mo,annual:an}:e);
    } else {
      expenses=[...expenses,{id:elUid(),name,monthly:mo,annual:an}];
    }
    elSaveAll(expenses);elCloseModal();elRender();
  }

  function elSwitchTo(app){
    const thRoot=document.getElementById('root');
    const elRoot=document.getElementById('el-root');
    if(app==='expenselog'){
      if(thRoot)thRoot.style.display='none';
      if(elRoot)elRoot.style.display='block';
      elApplyTheme();elRender();
      const sw=document.getElementById('el-app-switcher');if(sw)sw.value='expenselog';
    } else {
      if(elRoot)elRoot.style.display='none';
      if(thRoot)thRoot.style.display='';
      const isDark=elLoadTheme();
      const bg=isDark?'#16161a':'#f5f0e8';
      document.body.style.background=bg;document.documentElement.style.background=bg;
      document.body.classList.toggle('light-mode',!isDark);
      const sw=document.getElementById('th-app-switcher');if(sw)sw.value='taskhub';
    }
  }
  window._elSwitchTo=elSwitchTo;

  function elBind(){
    document.getElementById('el-theme-btn')?.addEventListener('click',()=>{
      const isDark=elLoadTheme();
      elSaveTheme(!isDark);
      elApplyTheme();
      document.body.classList.toggle('light-mode',isDark);
    });
    document.getElementById('el-edit-toggle')?.addEventListener('click',()=>{elEditMode=!elEditMode;elRender();});
    document.getElementById('el-add-btn')?.addEventListener('click',()=>{elModalState={mode:'add'};elOpenModal();});
    document.getElementById('el-modal-save')?.addEventListener('click',elHandleSave);
    document.getElementById('el-modal-cancel')?.addEventListener('click',elCloseModal);
    document.getElementById('el-overlay')?.addEventListener('click',ev=>{if(ev.target===document.getElementById('el-overlay'))elCloseModal();});
    document.getElementById('el-fname')?.addEventListener('keydown',e=>{if(e.key==='Enter')elHandleSave();});
    document.getElementById('el-app-switcher')?.addEventListener('change',e=>{if(e.target.value==='taskhub')elSwitchTo('taskhub');});
  }

  // Init
  elApplyTheme();
  elRender();
  elBind();
  elInitFirebase();
})();
</script>
</body>
</html>
